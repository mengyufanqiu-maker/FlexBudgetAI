<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBudget AI | 智能特种兵旅游规划师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-50 min-h-screen font-sans text-slate-800">

    <header class="bg-white/80 backdrop-blur shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-compass text-orange-500 text-2xl animate-spin-slow"></i>
                <h1 class="text-xl font-bold text-slate-800">FlexBudget <span class="text-orange-500">AI</span></h1>
            </div>
            <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-full font-medium">阶段二：商业变现验证版</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-orange-100/50 border border-orange-100 mb-8">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-slate-800">定制你的极限预算行程单</h2>
                <p class="text-slate-500 text-sm mt-1">输入你的硬性条件，大模型帮你精准卡死每一分钱</p>
            </div>

            <form id="planForm" onsubmit="submitForm(event)" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-map-pin text-orange-500 mr-1"></i> 想去哪里？</label>
                    <input type="text" id="destination" placeholder="例如：成都、大理、西安" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-wallet text-emerald-500 mr-1"></i> 硬核总预算 (元)</label>
                    <input type="number" id="budget" placeholder="例如：1500, 3000" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-calendar-days text-blue-500 mr-1"></i> 游玩天数</label>
                    <select id="days" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 transition">
                        <option value="2">2 天 (周末特种兵)</option>
                        <option value="3" selected>3 天 (经典深度游)</option>
                        <option value="5">5 天 (长假充能)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-user-group text-purple-500 mr-1"></i> 出游风格偏好</label>
                    <input type="text" id="tags" placeholder="例如：狂吃火锅、避开人流、古建筑打卡" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 transition">
                </div>

                <div class="md:col-span-2 text-center mt-4">
                    <button type="submit" id="submitBtn" class="bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-3.5 px-16 rounded-full shadow-lg shadow-orange-200 transition transform hover:-translate-y-0.5 inline-flex items-center space-x-2">
                        <i id="btnIcon" class="fa-solid fa-wand-magic-sparkles"></i>
                        <span id="btnText">极速生成高性价比路书</span>
                    </button>
                </div>
            </form>
        </div>

        <section id="resultSection" class="hidden">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                <div class="bg-slate-900 p-6 flex justify-between items-center text-white">
                    <div class="flex items-center space-x-2 font-bold">
                        <i class="fa-solid fa-route text-amber-400"></i>
                        <span>FlexBudget AI 特制专属路书</span>
                    </div>
                    <span class="text-xs bg-amber-400/20 text-amber-400 px-2 py-1 rounded font-mono">BUDGET LOCKED</span>
                </div>
                <div class="p-8 prose max-w-none" id="resultContent">
                    </div>
            </div>
        </section>
    </main>

    <script>
        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const resultSection = document.getElementById('resultSection');

            btn.disabled = true;
            btnIcon.className = 'fa-solid fa-spinner fa-spin';
            btnText.innerText = 'AI 正在精算全网机票酒店、极限锁价中...';
            resultSection.classList.add('hidden');

            try {
                const response = await fetch('/api/generate_route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        destination: document.getElementById('destination').value,
                        budget: document.getElementById('budget').value,
                        days: document.getElementById('days').value,
                        tags: document.getElementById('tags').value
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('resultContent').innerHTML = marked.parse(data.result);
                    resultSection.classList.remove('hidden');
                    resultSection.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('精算失败: ' + data.error);
                }
            } catch (e) { alert('网络链路故障: ' + e); }

            btn.disabled = false;
            btnIcon.className = 'fa-solid fa-wand-magic-sparkles';
            btnText.innerText = '极速生成高性价比路书';
        }
    </script>
</body>
</html>
